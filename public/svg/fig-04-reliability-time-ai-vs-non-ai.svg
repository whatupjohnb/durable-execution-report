<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 320" width="654" height="320" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="320" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Share of engineering time spent on reliability, AI vs non-AI teams</text>
  </g>

  <g id="legend" transform="translate(28,80)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#2C9B63"/><text x="16" y="9" font-size="11" fill="#242424">&lt;10%</text></g>
    <g transform="translate(70,0)"><rect width="10" height="10" fill="#9ADAB3"/><text x="16" y="9" font-size="11" fill="#242424">10–25%</text></g>
    <g transform="translate(150,0)"><rect width="10" height="10" fill="#FA8D86"/><text x="16" y="9" font-size="11" fill="#242424">26–50%</text></g>
    <g transform="translate(230,0)"><rect width="10" height="10" fill="#F54A3F"/><text x="16" y="9" font-size="11" fill="#242424">51%+</text></g>
  </g>

  <!-- Stacked rows; label column 110px, bar width 480px, inside labels -->
  <g id="rows" transform="translate(28,120)">
    <!-- AI teams: 25 / 48 / 20 / 7 -->
    <g id="row-ai" transform="translate(0,0)">
      <text x="0" y="22" font-size="13" fill="#242424">AI teams</text>
      <g transform="translate(118,0)">
        <rect x="0"   y="4" width="120" height="30" fill="#2C9B63"/>
        <rect x="120" y="4" width="230.4" height="30" fill="#9ADAB3"/>
        <rect x="350.4" y="4" width="96" height="30" fill="#FA8D86"/>
        <rect x="446.4" y="4" width="33.6" height="30" fill="#F54A3F"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle">
          <text x="60"   y="24">25%</text>
          <text x="235"  y="24">48%</text>
          <text x="398"  y="24" fill="#020202">20%</text>
          <text x="463"  y="24">7%</text>
        </g>
      </g>
    </g>

    <!-- Non-AI teams: 35 / 45 / 10 / 10 -->
    <g id="row-nonai" transform="translate(0,56)">
      <text x="0" y="22" font-size="13" fill="#242424">Non-AI teams</text>
      <g transform="translate(118,0)">
        <rect x="0"   y="4" width="168" height="30" fill="#2C9B63"/>
        <rect x="168" y="4" width="216" height="30" fill="#9ADAB3"/>
        <rect x="384" y="4" width="48"  height="30" fill="#FA8D86"/>
        <rect x="432" y="4" width="48"  height="30" fill="#F54A3F"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle">
          <text x="84"  y="24">35%</text>
          <text x="276" y="24" fill="#020202">45%</text>
          <text x="408" y="24">10%</text>
          <text x="456" y="24">10%</text>
        </g>
      </g>
    </g>
  </g>

  <g id="direction" transform="translate(146,225)">
    <text x="0"   y="0" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">← less time on reliability</text>
    <text x="480" y="0" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C" text-anchor="end">more time →</text>
  </g>

  <g id="source" transform="translate(28,280)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Distribution of reported reliability-work share, normalized to 100% per row.</tspan>
    </text>
  </g>
</svg>
