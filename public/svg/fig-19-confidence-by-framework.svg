<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 618 500" width="618" height="500" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="618" height="500" fill="#212121"/>

  <!-- Title -->
  <text x="28" y="50" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.4">Scaling confidence by agent framework</text>

  <!-- Legend -->
  <g id="legend" transform="translate(28,90)">
    <g transform="translate(0,0)">
      <rect width="14" height="14" fill="#FCC43F"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Very confident</text>
    </g>
    <g transform="translate(148,0)">
      <rect width="14" height="14" fill="#E5A83E"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Somewhat confident</text>
    </g>
    <g transform="translate(318,0)">
      <rect width="14" height="14" fill="#B5731E"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Not very confident</text>
    </g>
  </g>

  <!--
    Layout: Label 180 | gap 10 | bar 372 = 562 inner (28 each side)
    Bar scale: 372/100 = 3.72 px per %
    Row height: 58. 5 rows starting at y=144.
  -->

  <!-- Row 1: Mastra*  50/50/0 -->
  <g id="row-mastra" transform="translate(28,144)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Mastra*</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=6</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="186" height="30" fill="#FCC43F"/>
      <rect x="186" y="0" width="186" height="30" fill="#E5A83E"/>
    </g>
  </g>

  <!-- Row 2: Vercel AI SDK  35/57/8 -->
  <g id="row-vercel" transform="translate(28,202)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Vercel AI SDK</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=26</text>
    <g transform="translate(190,6)">
      <rect x="0"     y="0" width="130.2" height="30" fill="#FCC43F"/>
      <rect x="130.2" y="0" width="212.04" height="30" fill="#E5A83E"/>
      <rect x="342.24" y="0" width="29.76" height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 3: Direct API / DIY  16/64/20 -->
  <g id="row-direct" transform="translate(28,260)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Direct API / DIY</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=61</text>
    <g transform="translate(190,6)">
      <rect x="0"     y="0" width="59.52" height="30" fill="#FCC43F"/>
      <rect x="59.52" y="0" width="238.08" height="30" fill="#E5A83E"/>
      <rect x="297.6" y="0" width="74.4" height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 4: LlamaIndex*  14/72/14 -->
  <g id="row-llama" transform="translate(28,318)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">LlamaIndex*</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=7</text>
    <g transform="translate(190,6)">
      <rect x="0"     y="0" width="52.08" height="30" fill="#FCC43F"/>
      <rect x="52.08" y="0" width="267.84" height="30" fill="#E5A83E"/>
      <rect x="319.92" y="0" width="52.08" height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 5: LangChain/LangGraph  0/78/22 -->
  <g id="row-langchain" transform="translate(28,376)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">LangChain / LangGraph</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=18</text>
    <g transform="translate(190,6)">
      <rect x="0"      y="0" width="290.16" height="30" fill="#E5A83E"/>
      <rect x="290.16" y="0" width="81.84"  height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Direction labels -->
  <g transform="translate(186,444)">
    <text x="0" y="0" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">← more confident</text>
    <text x="372" y="0" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B" text-anchor="end">less confident →</text>
  </g>

  <!-- Source -->
  <g id="source" transform="translate(28,478)">
    <text font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#808080">
      <tspan x="0" dy="0">AI teams only. * = n&lt;10, directional. Ordered by % very confident (desc).</tspan>
    </text>
  </g>
</svg>
