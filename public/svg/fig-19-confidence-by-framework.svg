<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 460" width="654" height="460" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="460" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Scaling confidence by agent framework</text>
  </g>

  <g id="legend" transform="translate(28,78)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#2C9B63"/><text x="16" y="9" font-size="11" fill="#242424">Very confident</text></g>
    <g transform="translate(128,0)"><rect width="10" height="10" fill="#9ADAB3"/><text x="16" y="9" font-size="11" fill="#242424">Somewhat confident</text></g>
    <g transform="translate(270,0)"><rect width="10" height="10" fill="#FA8D86"/><text x="16" y="9" font-size="11" fill="#242424">Not very confident</text></g>
  </g>

  <!-- label 170 | bar 360 | right 60. -->
  <g id="rows" transform="translate(28,118)">

    <!-- Mastra* n=6 50/50/0 -->
    <g id="row-mastra" transform="translate(0,0)">
      <text x="0" y="18" font-size="13" fill="#242424">Mastra*</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=6</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="180" height="26" fill="#2C9B63"/>
        <rect x="180" y="4" width="180" height="26" fill="#9ADAB3"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="90" y="22">50%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="270" y="22">50%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">50% / 0%</text>
    </g>

    <!-- Vercel AI SDK n=26 35/57/8 -->
    <g id="row-vercel" transform="translate(0,50)">
      <text x="0" y="18" font-size="13" fill="#242424">Vercel AI SDK</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=26</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="126"   height="26" fill="#2C9B63"/>
        <rect x="126" y="4" width="205.2" height="26" fill="#9ADAB3"/>
        <rect x="331.2" y="4" width="28.8" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="63" y="22">35%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="229" y="22">57%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">35% / 8%</text>
    </g>

    <!-- Direct API / DIY n=61 16/64/20 -->
    <g id="row-direct" transform="translate(0,100)">
      <text x="0" y="18" font-size="13" fill="#242424">Direct API / DIY</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=61</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="57.6"  height="26" fill="#2C9B63"/>
        <rect x="57.6" y="4" width="230.4" height="26" fill="#9ADAB3"/>
        <rect x="288"  y="4" width="72"   height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="29" y="22">16%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="173" y="22">64%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="324" y="22">20%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">16% / 20%</text>
    </g>

    <!-- LlamaIndex* n=7 14/72/14 -->
    <g id="row-llama" transform="translate(0,150)">
      <text x="0" y="18" font-size="13" fill="#242424">LlamaIndex*</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=7</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="50.4"  height="26" fill="#2C9B63"/>
        <rect x="50.4" y="4" width="259.2" height="26" fill="#9ADAB3"/>
        <rect x="309.6" y="4" width="50.4" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="180" y="22">72%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">14% / 14%</text>
    </g>

    <!-- LangChain/LangGraph n=18 0/78/22 -->
    <g id="row-lang" transform="translate(0,200)">
      <text x="0" y="18" font-size="13" fill="#242424">LangChain / LangGraph</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=18</text>
      <g transform="translate(170,0)">
        <rect x="0"    y="4" width="280.8" height="26" fill="#9ADAB3"/>
        <rect x="280.8" y="4" width="79.2" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="140" y="22">78%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="320" y="22">22%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">0% / 22%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,420)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">AI teams only. Very / somewhat / not very confident. * = n&lt;10, directional. Values on the</tspan>
      <tspan x="0" dy="14">right: very confident % / not confident %.</tspan>
    </text>
  </g>
</svg>
