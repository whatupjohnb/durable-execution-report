<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 540" width="654" height="540" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="540" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Eval approach by team size</text>
  </g>

  <g id="legend" transform="translate(28,76)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#E86B5F"/><text x="16" y="9" font-size="11" fill="#242424">Built own pipeline</text></g>
    <g transform="translate(128,0)"><rect width="10" height="10" fill="#242424"/><text x="16" y="9" font-size="11" fill="#242424">Not doing evals</text></g>
    <g transform="translate(244,0)"><rect width="10" height="10" fill="#7BB7E7"/><text x="16" y="9" font-size="11" fill="#242424">LangFuse</text></g>
    <g transform="translate(332,0)"><rect width="10" height="10" fill="#4EB88A"/><text x="16" y="9" font-size="11" fill="#242424">LangSmith</text></g>
    <g transform="translate(422,0)"><rect width="10" height="10" fill="#8B5CC7"/><text x="16" y="9" font-size="11" fill="#242424">Braintrust</text></g>
    <g transform="translate(510,0)"><rect width="10" height="10" fill="#E5A83E"/><text x="16" y="9" font-size="11" fill="#242424">Arize / Phoenix</text></g>
  </g>

  <!--
    Domain 0..70%. plot height 300px. scale = 300/70 = 4.2857
    4 cohorts. 6 bars per cohort.
    Origin: x=40, y=130. width 580.
    Cohort block: 145px wide. Bar 16px, gap 2px -> 108px for 6 bars, inset 18px.
  -->
  <g id="plot" transform="translate(40,130)">
    <!-- grid -->
    <g stroke="#E2E2E2" stroke-dasharray="2 4">
      <line x1="0" y1="300" x2="580" y2="300"/>
      <line x1="0" y1="214.29" x2="580" y2="214.29"/>
      <line x1="0" y1="128.57" x2="580" y2="128.57"/>
      <line x1="0" y1="42.86" x2="580" y2="42.86"/>
    </g>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#7C7C7C" text-anchor="end">
      <text x="-8" y="304">0%</text>
      <text x="-8" y="218">20%</text>
      <text x="-8" y="133">40%</text>
      <text x="-8" y="47">60%</text>
    </g>

    <!-- Solo/2–10: 49, 34, 11, 6, 9, 6 -->
    <g transform="translate(18,0)">
      <rect x="0"  y="90"    width="16" height="210" fill="#E86B5F"/>
      <rect x="18" y="154.29" width="16" height="145.71" fill="#242424"/>
      <rect x="36" y="252.86" width="16" height="47.14"  fill="#7BB7E7"/>
      <rect x="54" y="274.29" width="16" height="25.71"  fill="#4EB88A"/>
      <rect x="72" y="261.43" width="16" height="38.57"  fill="#8B5CC7"/>
      <rect x="90" y="274.29" width="16" height="25.71"  fill="#E5A83E"/>
    </g>
    <!-- 11–50: 37, 44, 7, 11, 11, 7 -->
    <g transform="translate(163,0)">
      <rect x="0"  y="141.43" width="16" height="158.57" fill="#E86B5F"/>
      <rect x="18" y="111.43" width="16" height="188.57" fill="#242424"/>
      <rect x="36" y="270"    width="16" height="30"     fill="#7BB7E7"/>
      <rect x="54" y="252.86" width="16" height="47.14"  fill="#4EB88A"/>
      <rect x="72" y="252.86" width="16" height="47.14"  fill="#8B5CC7"/>
      <rect x="90" y="270"    width="16" height="30"     fill="#E5A83E"/>
    </g>
    <!-- 51–500: 60, 27, 20, 13, 0, 7 -->
    <g transform="translate(308,0)">
      <rect x="0"  y="42.86"  width="16" height="257.14" fill="#E86B5F"/>
      <rect x="18" y="184.29" width="16" height="115.71" fill="#242424"/>
      <rect x="36" y="214.29" width="16" height="85.71"  fill="#7BB7E7"/>
      <rect x="54" y="244.29" width="16" height="55.71"  fill="#4EB88A"/>
      <rect x="72" y="300"    width="16" height="0"      fill="#8B5CC7"/>
      <rect x="90" y="270"    width="16" height="30"     fill="#E5A83E"/>
    </g>
    <!-- 500+: 64, 27, 18, 18, 18, 0 -->
    <g transform="translate(453,0)">
      <rect x="0"  y="25.71"  width="16" height="274.29" fill="#E86B5F"/>
      <rect x="18" y="184.29" width="16" height="115.71" fill="#242424"/>
      <rect x="36" y="222.86" width="16" height="77.14"  fill="#7BB7E7"/>
      <rect x="54" y="222.86" width="16" height="77.14"  fill="#4EB88A"/>
      <rect x="72" y="222.86" width="16" height="77.14"  fill="#8B5CC7"/>
      <rect x="90" y="300"    width="16" height="0"      fill="#E5A83E"/>
    </g>

    <!-- axis labels -->
    <g font-size="12" fill="#242424" text-anchor="middle">
      <text x="72"  y="326">Solo/2–10</text>
      <text x="217" y="326">11–50</text>
      <text x="362" y="326">51–500</text>
      <text x="507" y="326">500+</text>
    </g>
    <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C" text-anchor="middle">
      <text x="72"  y="340">n=35</text>
      <text x="217" y="340">n=27</text>
      <text x="362" y="340">n=15</text>
      <text x="507" y="340">n=11</text>
    </g>
  </g>

  <g id="source" transform="translate(28,500)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q14: AI teams only. % of each size band. Multi-select.</tspan>
    </text>
  </g>
</svg>
