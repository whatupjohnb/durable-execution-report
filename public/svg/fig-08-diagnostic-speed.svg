<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 340" width="654" height="340" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="340" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Time to understand what went wrong</text>
  </g>

  <g id="chart" transform="translate(28,88)">
    <!-- horizontal bars. label 238px | bar 340 | value 36. scale 0-100 = 340. -->

    <g id="row-1" transform="translate(0,0)">
      <text x="0" y="14" font-size="13" fill="#242424">Minutes — good tracing, pinpoint fast</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=49</text>
      <rect x="250" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="250" y="2" width="129.2" height="26" fill="#2C9B63"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2C9B63" font-variant-numeric="tabular-nums">38%</text>
    </g>

    <g id="row-2" transform="translate(0,50)">
      <text x="0" y="14" font-size="13" fill="#242424">Under an hour, but it takes digging</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=70</text>
      <rect x="250" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="250" y="2" width="183.6" height="26" fill="#2389F1"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2389F1" font-variant-numeric="tabular-nums">54%</text>
    </g>

    <g id="row-3" transform="translate(0,100)">
      <text x="0" y="14" font-size="13" fill="#242424">Hours — requires investigation</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=6</text>
      <rect x="250" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="250" y="2" width="17.0" height="26" fill="#FF7300"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#FF7300" font-variant-numeric="tabular-nums">5%</text>
    </g>

    <g id="row-4" transform="translate(0,150)">
      <text x="0" y="14" font-size="13" fill="#242424">We often can't fully explain</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=5</text>
      <rect x="250" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="250" y="2" width="13.6" height="26" fill="#F54A3F"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#F54A3F" font-variant-numeric="tabular-nums">4%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,300)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q5: When a workflow fails in production, how long does it typically take to understand what</tspan>
      <tspan x="0" dy="14">went wrong? All respondents n=130.</tspan>
    </text>
  </g>
</svg>
