<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 618 620" width="618" height="620" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="618" height="620" fill="#212121"/>

  <!-- Title -->
  <text x="28" y="50" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.4">What's broken about agent frameworks — by tool</text>

  <!--
    Layout:
    Label col: 130 | 5 data cols × 86 = 430.  Inner width = 28 + 130 + 430 = 588, padding-right 30.
    Header row height: 100 (for wrapped 2-line headers).
    Row height: 64. 5 rows.
    Cell padding: 2 between cells.
  -->

  <!-- Column headers (starts at x=158) -->
  <g id="headers" transform="translate(158,94)">
    <g font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle">
      <g transform="translate(43,0)"><text y="14">Harder</text><text y="30">to trace</text></g>
      <g transform="translate(129,0)"><text y="14">Poor</text><text y="30">stateful</text></g>
      <g transform="translate(215,0)"><text y="14">App layer</text><text y="30">only</text></g>
      <g transform="translate(301,0)"><text y="14">Too</text><text y="30">rigid</text></g>
      <g transform="translate(387,0)"><text y="14">Lock-in</text></g>
    </g>
  </g>

  <!--
    Rows. Row label at x=28, data cells at x=158. Row height 64.
    Cell: 84 wide × 56 tall with 2px margin between cells (actually I'll use x offsets to 86 spacing).
  -->

  <!-- Row: Direct / DIY  [38, 26, 21, 25, 18]   (n=61) -->
  <g id="row-direct" transform="translate(28,168)">
    <text x="0" y="30" font-size="16" font-weight="600" fill="#FFFFFF">Direct / DIY</text>
    <text x="0" y="48" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=61</text>
    <g transform="translate(130,0)">
      <!-- 38: amber -->
      <rect x="0"   y="4" width="84" height="56" fill="#B5731E"/>
      <!-- 26: dark -->
      <rect x="86"  y="4" width="84" height="56" fill="#3A3A3A"/>
      <!-- 21: dark -->
      <rect x="172" y="4" width="84" height="56" fill="#3A3A3A"/>
      <!-- 25: dark -->
      <rect x="258" y="4" width="84" height="56" fill="#3A3A3A"/>
      <!-- 18: dark -->
      <rect x="344" y="4" width="84" height="56" fill="#3A3A3A"/>
      <g font-size="17" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle">
        <text x="42"  y="38" fill="#FFFFFF">38%</text>
        <text x="128" y="38" fill="#FFFFFF">26%</text>
        <text x="214" y="38" fill="#FFFFFF">21%</text>
        <text x="300" y="38" fill="#FFFFFF">25%</text>
        <text x="386" y="38" fill="#FFFFFF">18%</text>
      </g>
    </g>
  </g>

  <!-- Row: Vercel AI SDK  [54, 35, 38, 23, 35]   (n=26) -->
  <g id="row-vercel" transform="translate(28,232)">
    <text x="0" y="30" font-size="16" font-weight="600" fill="#FFFFFF">Vercel AI SDK</text>
    <text x="0" y="48" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=26</text>
    <g transform="translate(130,0)">
      <rect x="0"   y="4" width="84" height="56" fill="#FCC43F"/>
      <rect x="86"  y="4" width="84" height="56" fill="#B5731E"/>
      <rect x="172" y="4" width="84" height="56" fill="#B5731E"/>
      <rect x="258" y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="344" y="4" width="84" height="56" fill="#B5731E"/>
