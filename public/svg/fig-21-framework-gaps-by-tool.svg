    <g transform="translate(0,224)">
      <text x="0" y="22" font-size="12" fill="#242424">Mastra</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=6</text>
      <g transform="translate(150,0)">
