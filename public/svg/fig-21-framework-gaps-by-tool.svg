        <rect x="84"  y="4" width="80" height="44" fill="#F1F1F1"/>
        <rect x="168" y="4" width="80" height="44" fill="#F1F1F1"/>
        <rect x="252" y="4" width="80" height="44" fill="#F1F1F1"/>
        <rect x="336" y="4" width="80" height="44" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#020202">
          <text x="40"  y="30">38%</text>
          <text x="124" y="30">26%</text>
          <text x="208" y="30">21%</text>
          <text x="292" y="30">25%</text>
          <text x="376" y="30">18%</text>
        </g>
      </g>
    </g>
