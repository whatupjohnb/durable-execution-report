  <g id="legend" transform="translate(28,400)">
    <g transform="translate(0,0)"><rect width="12" height="12" fill="#EC5E54"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">50%+</text></g>
    <g transform="translate(80,0)"><rect width="12" height="12" fill="#F9CCA5"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">30–49%</text></g>
    <g transform="translate(170,0)"><rect width="12" height="12" fill="#F1F1F1"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">&lt;30%</text></g>
  </g>

  <g id="source" transform="translate(28,432)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q17: % of framework users citing each limitation. Tools with n&lt;3 excluded.</tspan>
    </text>
