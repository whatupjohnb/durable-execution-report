        <rect x="84"  y="4" width="80" height="44" fill="#EC5E54"/>
        <rect x="168" y="4" width="80" height="44" fill="#F1F1F1"/>
        <rect x="252" y="4" width="80" height="44" fill="#F9CCA5"/>
        <rect x="336" y="4" width="80" height="44" fill="#F1F1F1"/>
