<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 460" width="654" height="460" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="460" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">What's broken about agent frameworks — by tool</text>
  </g>

  <!-- 5 rows × 5 columns. row label 150 | 5 cells × 84 = 420. Total 570, +28 pad = 598 -->

  <g id="column-headers" transform="translate(180,110)">
    <g font-size="11" fill="#242424">
      <g transform="translate(42,-6) rotate(-30)"><text x="0" y="0">Harder to trace</text></g>
      <g transform="translate(126,-6) rotate(-30)"><text x="0" y="0">Poor stateful</text></g>
      <g transform="translate(210,-6) rotate(-30)"><text x="0" y="0">App layer only</text></g>
      <g transform="translate(294,-6) rotate(-30)"><text x="0" y="0">Too rigid</text></g>
      <g transform="translate(378,-6) rotate(-30)"><text x="0" y="0">Lock-in</text></g>
    </g>
  </g>

  <g id="rows" transform="translate(28,140)">
    <!-- Direct/DIY n=61  [38, 26, 21, 25, 18] -->
    <g transform="translate(0,0)">
      <text x="0" y="22" font-size="12" fill="#242424">Direct / DIY</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=61</text>
      <g transform="translate(150,0)">
