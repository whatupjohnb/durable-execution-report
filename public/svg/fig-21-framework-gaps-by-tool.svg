        <text x="128" y="38" fill="#FFFFFF">35%</text>
        <text x="214" y="38" fill="#FFFFFF">38%</text>
        <text x="300" y="38" fill="#FFFFFF">23%</text>
        <text x="386" y="38" fill="#FFFFFF">35%</text>
      </g>
    </g>
  </g>

