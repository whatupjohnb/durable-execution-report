  <!-- Legend -->
  <g id="legend" transform="translate(28,524)">
    <g transform="translate(0,0)">
      <rect width="14" height="14" fill="#FCC43F"/>
      <text x="22" y="12" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#FFFFFF">50%+</text>
    </g>
    <g transform="translate(96,0)">
      <rect width="14" height="14" fill="#B5731E"/>
      <text x="22" y="12" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#FFFFFF">30–49%</text>
    </g>
    <g transform="translate(210,0)">
      <rect width="14" height="14" fill="#3A3A3A"/>
      <text x="22" y="12" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#FFFFFF">&lt;30%</text>
    </g>
  </g>

  <!-- Source -->
  <g id="source" transform="translate(28,568)">
    <text font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#808080">
      <tspan x="0" dy="0">Q17: % of framework users citing each limitation. Tools with n&lt;3 excluded.</tspan>
    </text>
