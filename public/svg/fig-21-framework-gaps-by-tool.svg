      <rect x="86"  y="4" width="84" height="56" fill="#FCC43F"/>
      <rect x="172" y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="258" y="4" width="84" height="56" fill="#B5731E"/>
      <rect x="344" y="4" width="84" height="56" fill="#3A3A3A"/>
      <g font-size="17" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle">
        <text x="42"  y="38" fill="#212121">50%</text>
        <text x="128" y="38" fill="#212121">50%</text>
        <text x="214" y="38" fill="#FFFFFF">28%</text>
        <text x="300" y="38" fill="#FFFFFF">39%</text>
        <text x="386" y="38" fill="#FFFFFF">28%</text>
      </g>
    </g>
  </g>

  <!-- Row: LlamaIndex  [43, 14, 29, 71, 14]   (n=7) -->
  <g id="row-llama" transform="translate(28,360)">
    <text x="0" y="30" font-size="16" font-weight="600" fill="#FFFFFF">LlamaIndex</text>
    <text x="0" y="48" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=7</text>
    <g transform="translate(130,0)">
      <rect x="0"   y="4" width="84" height="56" fill="#B5731E"/>
      <rect x="86"  y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="172" y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="258" y="4" width="84" height="56" fill="#FCC43F"/>
      <rect x="344" y="4" width="84" height="56" fill="#3A3A3A"/>
      <g font-size="17" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle">
        <text x="42"  y="38" fill="#FFFFFF">43%</text>
        <text x="128" y="38" fill="#FFFFFF">14%</text>
        <text x="214" y="38" fill="#FFFFFF">29%</text>
        <text x="300" y="38" fill="#212121">71%</text>
        <text x="386" y="38" fill="#FFFFFF">14%</text>
      </g>
    </g>
  </g>

  <!-- Row: Mastra  [67, 17, 33, 17, 0]   (n=6) -->
  <g id="row-mastra" transform="translate(28,424)">
    <text x="0" y="30" font-size="16" font-weight="600" fill="#FFFFFF">Mastra</text>
    <text x="0" y="48" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=6</text>
    <g transform="translate(130,0)">
      <rect x="0"   y="4" width="84" height="56" fill="#FCC43F"/>
      <rect x="86"  y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="172" y="4" width="84" height="56" fill="#B5731E"/>
      <rect x="258" y="4" width="84" height="56" fill="#3A3A3A"/>
      <rect x="344" y="4" width="84" height="56" fill="#2A2A2A"/>
      <g font-size="17" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle">
        <text x="42"  y="38" fill="#212121">67%</text>
        <text x="128" y="38" fill="#FFFFFF">17%</text>
        <text x="214" y="38" fill="#FFFFFF">33%</text>
        <text x="300" y="38" fill="#FFFFFF">17%</text>
        <text x="386" y="38" fill="#666666">0%</text>
