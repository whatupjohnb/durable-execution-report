<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 560" width="654" height="560" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="560" fill="#212121"/>

  <!-- Title -->
  <g id="title">
    <text x="32" y="56" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.4">Scaling confidence by eval approach</text>
  </g>

  <!-- Legend -->
  <g id="legend" transform="translate(32,96)">
    <g transform="translate(0,0)">
      <rect width="14" height="14" fill="#FCC43F"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Very confident</text>
    </g>
    <g transform="translate(148,0)">
      <rect width="14" height="14" fill="#E5A83E"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Somewhat confident</text>
    </g>
    <g transform="translate(318,0)">
      <rect width="14" height="14" fill="#B5731E"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Not very confident</text>
    </g>
    <g transform="translate(480,0)">
      <rect width="14" height="14" fill="#6B3F12"/>
      <text x="22" y="12" font-size="13" fill="#FFFFFF">Not confident</text>
    </g>
  </g>

  <!--
    Layout:
    Label col: 180px | Bar area: 400px | 100% = 400px
    Row height: 58px. 6 rows starting at y=150.
  -->

  <!-- Row 1: Braintrust  50/38/12 -->
  <g id="row-braintrust" transform="translate(32,150)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Braintrust</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=8</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="200" height="30" fill="#FCC43F"/>
      <rect x="200" y="0" width="152" height="30" fill="#E5A83E"/>
      <rect x="352" y="0" width="48"  height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 2: Built own pipeline  21/63/16 -->
  <g id="row-own" transform="translate(32,208)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Built own pipeline</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=43</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="84"  height="30" fill="#FCC43F"/>
      <rect x="84"  y="0" width="252" height="30" fill="#E5A83E"/>
      <rect x="336" y="0" width="64"  height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 3: Arize / Phoenix  20/80/0 -->
  <g id="row-arize" transform="translate(32,266)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Arize / Phoenix</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=5</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="80"  height="30" fill="#FCC43F"/>
      <rect x="80"  y="0" width="320" height="30" fill="#E5A83E"/>
    </g>
  </g>

  <!-- Row 4: LangSmith  11/78/11 -->
  <g id="row-langsmith" transform="translate(32,324)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">LangSmith</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=9</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="44"  height="30" fill="#FCC43F"/>
      <rect x="44"  y="0" width="312" height="30" fill="#E5A83E"/>
      <rect x="356" y="0" width="44"  height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 5: LangFuse  9/82/9 -->
  <g id="row-langfuse" transform="translate(32,382)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">LangFuse</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=11</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="36"  height="30" fill="#FCC43F"/>
      <rect x="36"  y="0" width="328" height="30" fill="#E5A83E"/>
      <rect x="364" y="0" width="36"  height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Row 6: Not doing evals  6/65/29 -->
  <g id="row-none" transform="translate(32,440)">
    <text x="0" y="16" font-size="18" font-weight="600" fill="#FFFFFF">Not doing evals</text>
    <text x="0" y="36" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=31</text>
    <g transform="translate(190,6)">
      <rect x="0"   y="0" width="24"  height="30" fill="#FCC43F"/>
      <rect x="24"  y="0" width="260" height="30" fill="#E5A83E"/>
      <rect x="284" y="0" width="116" height="30" fill="#B5731E"/>
    </g>
  </g>

  <!-- Direction labels -->
  <g transform="translate(222,508)">
    <text x="0" y="0" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">← more confident</text>
    <text x="400" y="0" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B" text-anchor="end">less confident →</text>
  </g>

  <!-- Source -->
  <g id="source" transform="translate(32,536)">
    <text font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#808080">
      <tspan x="0" dy="0">AI teams only. Very / somewhat / not very confident. Ordered by % very confident (desc).</tspan>
    </text>
  </g>
</svg>
