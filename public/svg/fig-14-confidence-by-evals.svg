<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 540" width="654" height="540" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="540" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Scaling confidence by eval approach</text>
  </g>

  <g id="legend" transform="translate(28,78)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#2C9B63"/><text x="16" y="9" font-size="11" fill="#242424">Very confident</text></g>
    <g transform="translate(128,0)"><rect width="10" height="10" fill="#9ADAB3"/><text x="16" y="9" font-size="11" fill="#242424">Somewhat confident</text></g>
    <g transform="translate(270,0)"><rect width="10" height="10" fill="#FA8D86"/><text x="16" y="9" font-size="11" fill="#242424">Not very confident</text></g>
  </g>

  <!-- label 170 | bar 360 | right 60. stacked 100% -->
  <g id="rows" transform="translate(28,118)">

    <g id="row-bt" transform="translate(0,0)">
      <text x="0" y="18" font-size="13" fill="#242424">Braintrust*</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=8</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="180" height="26" fill="#2C9B63"/>
        <rect x="180" y="4" width="136.8" height="26" fill="#9ADAB3"/>
        <rect x="316.8" y="4" width="43.2" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="90" y="22">50%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="248" y="22">38%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">50% / 12%</text>
    </g>

    <g id="row-own" transform="translate(0,50)">
      <text x="0" y="18" font-size="13" fill="#242424">Built own pipeline</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=43</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="75.6"  height="26" fill="#2C9B63"/>
        <rect x="75.6" y="4" width="226.8" height="26" fill="#9ADAB3"/>
        <rect x="302.4" y="4" width="57.6" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="38" y="22">21%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="189" y="22">63%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">21% / 16%</text>
    </g>

    <g id="row-arize" transform="translate(0,100)">
      <text x="0" y="18" font-size="13" fill="#242424">Arize / Phoenix*</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=5</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="72"  height="26" fill="#2C9B63"/>
        <rect x="72"  y="4" width="288" height="26" fill="#9ADAB3"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="36" y="22">20%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="216" y="22">80%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">20% / 0%</text>
    </g>

    <g id="row-ls" transform="translate(0,150)">
      <text x="0" y="18" font-size="13" fill="#242424">LangSmith*</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=9</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="39.6" height="26" fill="#2C9B63"/>
        <rect x="39.6" y="4" width="280.8" height="26" fill="#9ADAB3"/>
        <rect x="320.4" y="4" width="39.6" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="180" y="22">78%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">11% / 11%</text>
    </g>

    <g id="row-lf" transform="translate(0,200)">
      <text x="0" y="18" font-size="13" fill="#242424">LangFuse</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=11</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="32.4" height="26" fill="#2C9B63"/>
        <rect x="32.4" y="4" width="295.2" height="26" fill="#9ADAB3"/>
        <rect x="327.6" y="4" width="32.4" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="180" y="22">82%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">9% / 9%</text>
    </g>

    <g id="row-none" transform="translate(0,250)">
      <text x="0" y="18" font-size="13" fill="#242424">Not doing evals</text>
      <text x="0" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=31</text>
      <g transform="translate(170,0)">
        <rect x="0"   y="4" width="21.6" height="26" fill="#2C9B63"/>
        <rect x="21.6" y="4" width="234"   height="26" fill="#9ADAB3"/>
        <rect x="255.6" y="4" width="104.4" height="26" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="139" y="22">65%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="308" y="22">29%</text></g>
      </g>
      <text x="598" y="22" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">6% / 29%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,490)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">AI teams only. Very / somewhat / not very confident. * = n&lt;10, directional. Values on the</tspan>
      <tspan x="0" dy="14">right: very confident % / not confident %.</tspan>
    </text>
  </g>
</svg>
