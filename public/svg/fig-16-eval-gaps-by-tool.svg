    <text x="48" y="116" font-size="16" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=43</text>
    <g transform="translate(288,0)">
      <rect x="0"   y="0" width="126" height="142" fill="#B5731E"/>
      <rect x="130" y="0" width="126" height="142" fill="#B5731E"/>
      <rect x="260" y="0" width="126" height="142" fill="#B5731E"/>
      <rect x="390" y="0" width="126" height="142" fill="#3A3A3A"/>
