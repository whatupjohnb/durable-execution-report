<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1117 1440" width="1117" height="1440" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="1117" height="1440" fill="#212121"/>

  <!-- Title -->
  <text x="48" y="104" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="-0.8">What's wrong with current eval solutions</text>
  <text x="48" y="162" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="-0.8">— by tool</text>

  <!--
    Layout:
    Padding-left: 48. Label col: 240.  Data area starts x=288. Col width: 130 (126 + 4 gap).
    Header area: y=224 to 400 (176 tall for wrapped 2-line headers).
    First data row: y=412. Row height: 150. 6 rows → ends y=1312.
    Legend: y=1352. Source: y=1400.
  -->

  <!-- Column headers -->
  <g id="headers" transform="translate(288,224)">
    <g font-size="20" font-weight="500" fill="#FFFFFF" text-anchor="middle">
      <g transform="translate(63,0)">
        <text y="30">Hard-to-write</text>
        <text y="58">evals</text>
      </g>
      <g transform="translate(193,0)">
        <text y="30">LLM-as-judge</text>
        <text y="58">cost</text>
      </g>
      <g transform="translate(323,0)">
        <text y="30">Results in</text>
        <text y="58">separate system</text>
      </g>
      <g transform="translate(453,0)">
        <text y="30">Not enough</text>
        <text y="58">coverage</text>
      </g>
      <g transform="translate(583,0)">
        <text y="30">No way to act</text>
        <text y="58">on failure</text>
      </g>
      <g transform="translate(713,0)">
        <text y="30">Offline</text>
        <text y="58">only</text>
      </g>
    </g>
  </g>

  <!-- Horizontal rule under headers -->
  <line x1="288" y1="400" x2="1062" y2="400" stroke="#3A3A3A" stroke-width="1"/>

