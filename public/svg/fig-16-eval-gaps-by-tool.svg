  <!-- Source -->
  <g id="source" transform="translate(48,1408)">
    <text font-size="16" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#808080">
      <tspan x="0" dy="0">Q15: % of each tool's users citing each limitation. Tools with n&lt;3 (W&amp;B, Helicone) excluded.</tspan>
