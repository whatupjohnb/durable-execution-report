<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 500" width="654" height="500" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="500" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">What's wrong with current eval solutions — by tool</text>
  </g>

  <!--
    Heatmap table. 7 columns = row label + 6 gap categories.
    Row label: 150px | 6 cells of 72px each = 432 | + 2 trailing = total 582. Start x=28.
    Cell height 56. Header height 96 (rotated).
    Colors: red (>=50%), amber (30-49%), neutral (<30%)
  -->

  <g id="column-headers" transform="translate(180,110)">
    <!-- column labels rotated -45deg -->
    <g font-size="10.5" fill="#242424">
      <g transform="translate(36,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">Hard-to-write evals</text>
      </g>
      <g transform="translate(108,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">LLM-as-judge cost</text>
      </g>
      <g transform="translate(180,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">Results in separate system</text>
      </g>
      <g transform="translate(252,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">Not enough coverage</text>
      </g>
      <g transform="translate(324,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">No way to act on failure</text>
      </g>
      <g transform="translate(396,-8) rotate(-38)">
        <text x="0" y="0" text-anchor="start">Offline only</text>
      </g>
    </g>
  </g>

  <g id="rows" transform="translate(28,140)">
    <!-- Row: Built own pipeline  [47, 35, 30, 21, 26, 19] -->
    <g transform="translate(0,0)">
      <text x="0" y="22" font-size="12" fill="#242424">Built own pipeline</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=43</text>
      <g transform="translate(150,0)">
        <rect x="0"   y="4" width="68" height="40" fill="#F39C93"/>
        <rect x="72"  y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="144" y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="216" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#020202">
          <text x="34"  y="28">47%</text>
          <text x="106" y="28">35%</text>
          <text x="178" y="28">30%</text>
          <text x="250" y="28">21%</text>
          <text x="322" y="28">26%</text>
          <text x="394" y="28">19%</text>
        </g>
      </g>
    </g>
    <!-- LangFuse n=11  [64, 55, 45, 55, 27, 18] -->
    <g transform="translate(0,52)">
      <text x="0" y="22" font-size="12" fill="#242424">LangFuse</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=11</text>
      <g transform="translate(150,0)">
        <rect x="0"   y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="72"  y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="144" y="4" width="68" height="40" fill="#F39C93"/>
        <rect x="216" y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#ffffff">
          <text x="34"  y="28">64%</text>
          <text x="106" y="28">55%</text>
          <text x="178" y="28" fill="#020202">45%</text>
          <text x="250" y="28">55%</text>
          <text x="322" y="28" fill="#020202">27%</text>
          <text x="394" y="28" fill="#020202">18%</text>
        </g>
      </g>
    </g>
    <!-- LangSmith n=9  [78, 44, 56, 0, 11, 56] -->
    <g transform="translate(0,104)">
      <text x="0" y="22" font-size="12" fill="#242424">LangSmith</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=9</text>
      <g transform="translate(150,0)">
        <rect x="0"   y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="72"  y="4" width="68" height="40" fill="#F39C93"/>
        <rect x="144" y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="216" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#EC5E54"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#ffffff">
          <text x="34"  y="28">78%</text>
          <text x="106" y="28" fill="#020202">44%</text>
          <text x="178" y="28">56%</text>
          <text x="250" y="28" fill="#020202">0%</text>
          <text x="322" y="28" fill="#020202">11%</text>
          <text x="394" y="28">56%</text>
        </g>
      </g>
    </g>
    <!-- Braintrust n=8 [50, 25, 38, 25, 0, 25] -->
    <g transform="translate(0,156)">
      <text x="0" y="22" font-size="12" fill="#242424">Braintrust</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=8</text>
      <g transform="translate(150,0)">
        <rect x="0"   y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="72"  y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="144" y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="216" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#ffffff">
          <text x="34"  y="28">50%</text>
          <text x="106" y="28" fill="#020202">25%</text>
          <text x="178" y="28" fill="#020202">38%</text>
          <text x="250" y="28" fill="#020202">25%</text>
          <text x="322" y="28" fill="#020202">0%</text>
          <text x="394" y="28" fill="#020202">25%</text>
        </g>
      </g>
    </g>
    <!-- Arize/Phoenix n=5 [80, 20, 60, 40, 0, 20] -->
    <g transform="translate(0,208)">
      <text x="0" y="22" font-size="12" fill="#242424">Arize / Phoenix</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=5</text>
      <g transform="translate(150,0)">
        <rect x="0"   y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="72"  y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="144" y="4" width="68" height="40" fill="#EC5E54"/>
        <rect x="216" y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#ffffff">
          <text x="34"  y="28">80%</text>
          <text x="106" y="28" fill="#020202">20%</text>
          <text x="178" y="28">60%</text>
          <text x="250" y="28" fill="#020202">40%</text>
          <text x="322" y="28" fill="#020202">0%</text>
          <text x="394" y="28" fill="#020202">20%</text>
        </g>
      </g>
    </g>
    <!-- Not doing evals n=31  [35, 42, 29, 3, 13, 6] -->
    <g transform="translate(0,260)">
      <text x="0" y="22" font-size="12" fill="#242424" opacity="0.7">Not doing evals</text>
      <text x="0" y="36" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=31</text>
      <g transform="translate(150,0)" opacity="0.7">
        <rect x="0"   y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="72"  y="4" width="68" height="40" fill="#F9CCA5"/>
        <rect x="144" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="216" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="288" y="4" width="68" height="40" fill="#F1F1F1"/>
        <rect x="360" y="4" width="68" height="40" fill="#F1F1F1"/>
        <g font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#020202">
          <text x="34"  y="28">35%</text>
          <text x="106" y="28">42%</text>
          <text x="178" y="28">29%</text>
          <text x="250" y="28">3%</text>
          <text x="322" y="28">13%</text>
          <text x="394" y="28">6%</text>
        </g>
      </g>
    </g>
  </g>

  <g id="legend" transform="translate(28,440)">
    <g transform="translate(0,0)"><rect width="12" height="12" fill="#EC5E54"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">50%+</text></g>
    <g transform="translate(80,0)"><rect width="12" height="12" fill="#F9CCA5"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">30–49%</text></g>
    <g transform="translate(170,0)"><rect width="12" height="12" fill="#F1F1F1"/><text x="18" y="10" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424">&lt;30%</text></g>
  </g>

  <g id="source" transform="translate(28,470)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q15: % of each tool's users citing each limitation. Tools with n&lt;3 (W&amp;B, Helicone) excluded.</tspan>
    </text>
  </g>
</svg>
