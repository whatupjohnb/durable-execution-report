<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 360" width="654" height="360" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="360" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Net change in reliability burden over 12 months, by tool</text>
  </g>

  <!--
    Divergent horizontal bar. Domain −12..+24. Zero line placed at x = 160 + 12*(400/36) = 160+133.33
    Inner plot x: 160 to 560 (400px). px/pp = 400/36 ≈ 11.111
    Zero line x = 160 + 12*11.111 = 160 + 133.33 = 293.33
  -->
  <g id="chart" transform="translate(28,80)">
    <!-- axis labels -->
    <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C" text-anchor="middle">
      <text x="132" y="0">-12pp</text>
      <text x="265.33" y="0">0</text>
      <text x="376.45" y="0">+10pp</text>
      <text x="487.55" y="0">+20pp</text>
    </g>

    <!-- zero line -->
    <line x1="265.33" y1="8" x2="265.33" y2="238" stroke="#B0B0B0" stroke-dasharray="2 3"/>

    <!-- row 1: Temporal +22 -->
    <g transform="translate(0,12)">
      <text x="0" y="22" font-size="13" fill="#242424">Temporal</text>
      <rect x="265.33" y="10" width="244.44" height="24" fill="#F54A3F"/>
      <text x="540" y="28" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#F54A3F" font-variant-numeric="tabular-nums">+22pp</text>
    </g>

    <!-- row 2: AWS / Vercel / CF +9 -->
    <g transform="translate(0,56)">
      <text x="0" y="22" font-size="13" fill="#242424">AWS / Vercel / CF</text>
      <rect x="265.33" y="10" width="100.00" height="24" fill="#FA8D86"/>
      <text x="380" y="28" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#FA8D86" font-variant-numeric="tabular-nums">+9pp</text>
    </g>

    <!-- row 3: BullMQ / Celery / Sidekiq -5 -->
    <g transform="translate(0,100)">
      <text x="0" y="22" font-size="13" fill="#242424">BullMQ / Celery / Sidekiq</text>
      <rect x="209.78" y="10" width="55.55" height="24" fill="#9ADAB3"/>
      <text x="150" y="28" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" text-anchor="end" font-variant-numeric="tabular-nums">-5pp</text>
    </g>

    <!-- row 4: Custom-built -9 -->
    <g transform="translate(0,144)">
      <text x="0" y="22" font-size="13" fill="#242424">Custom-built</text>
      <rect x="165.33" y="10" width="100" height="24" fill="#66BD8B"/>
      <text x="150" y="28" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" text-anchor="end" font-variant-numeric="tabular-nums">-9pp</text>
    </g>

    <!-- row 5: Inngest -10 -->
    <g transform="translate(0,188)">
      <text x="0" y="22" font-size="13" fill="#242424">Inngest</text>
      <rect x="154.22" y="10" width="111.11" height="24" fill="#2C9B63"/>
      <text x="150" y="28" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" text-anchor="end" font-variant-numeric="tabular-nums">-10pp</text>
    </g>
  </g>

  <g id="source" transform="translate(28,320)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Percentage-point change in share of teams reporting increased reliability work, by primary tool.</tspan>
      <tspan x="0" dy="14">Negative = net decrease. Positive = net increase.</tspan>
    </text>
  </g>
</svg>
