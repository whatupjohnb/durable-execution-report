<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 540" width="654" height="540" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="540" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Agent framework adoption by team size</text>
  </g>

  <g id="legend" transform="translate(28,76)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#E86B5F"/><text x="16" y="9" font-size="11" fill="#242424">Direct API / DIY</text></g>
    <g transform="translate(110,0)"><rect width="10" height="10" fill="#4F9BE7"/><text x="16" y="9" font-size="11" fill="#242424">Vercel AI SDK</text></g>
    <g transform="translate(216,0)"><rect width="10" height="10" fill="#4EB88A"/><text x="16" y="9" font-size="11" fill="#242424">LangChain / LGraph</text></g>
    <g transform="translate(346,0)"><rect width="10" height="10" fill="#8B5CC7"/><text x="16" y="9" font-size="11" fill="#242424">LlamaIndex</text></g>
    <g transform="translate(444,0)"><rect width="10" height="10" fill="#E5A83E"/><text x="16" y="9" font-size="11" fill="#242424">Mastra</text></g>
  </g>

  <!-- domain 0..80. plot 300px. scale 300/80 = 3.75 -->
  <g id="plot" transform="translate(40,130)">
    <g stroke="#E2E2E2" stroke-dasharray="2 4">
      <line x1="0" y1="300" x2="580" y2="300"/>
      <line x1="0" y1="225" x2="580" y2="225"/>
      <line x1="0" y1="150" x2="580" y2="150"/>
      <line x1="0" y1="75"  x2="580" y2="75"/>
      <line x1="0" y1="0"   x2="580" y2="0"/>
    </g>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#7C7C7C" text-anchor="end">
      <text x="-8" y="304">0%</text>
      <text x="-8" y="229">20%</text>
      <text x="-8" y="154">40%</text>
      <text x="-8" y="79">60%</text>
      <text x="-8" y="4">80%</text>
    </g>

    <!-- Solo/2–10: 77, 34, 6, 3, 6 -->
    <g transform="translate(25,0)">
      <rect x="0"  y="11.25" width="18" height="288.75" fill="#E86B5F"/>
      <rect x="20" y="172.5" width="18" height="127.5"  fill="#4F9BE7"/>
      <rect x="40" y="277.5" width="18" height="22.5"   fill="#4EB88A"/>
      <rect x="60" y="288.75" width="18" height="11.25" fill="#8B5CC7"/>
      <rect x="80" y="277.5" width="18" height="22.5"   fill="#E5A83E"/>
    </g>
    <!-- 11–50: 59, 33, 22, 11, 7 -->
    <g transform="translate(170,0)">
      <rect x="0"  y="78.75" width="18" height="221.25" fill="#E86B5F"/>
      <rect x="20" y="176.25" width="18" height="123.75" fill="#4F9BE7"/>
      <rect x="40" y="217.5" width="18" height="82.5"   fill="#4EB88A"/>
      <rect x="60" y="258.75" width="18" height="41.25" fill="#8B5CC7"/>
      <rect x="80" y="273.75" width="18" height="26.25" fill="#E5A83E"/>
    </g>
    <!-- 51–500: 67, 20, 33, 13, 7 -->
    <g transform="translate(315,0)">
      <rect x="0"  y="48.75" width="18" height="251.25" fill="#E86B5F"/>
      <rect x="20" y="225"   width="18" height="75"     fill="#4F9BE7"/>
      <rect x="40" y="176.25" width="18" height="123.75" fill="#4EB88A"/>
      <rect x="60" y="251.25" width="18" height="48.75" fill="#8B5CC7"/>
      <rect x="80" y="273.75" width="18" height="26.25" fill="#E5A83E"/>
    </g>
    <!-- 500+: 73, 18, 45, 9, 9 -->
    <g transform="translate(460,0)">
      <rect x="0"  y="26.25" width="18" height="273.75" fill="#E86B5F"/>
      <rect x="20" y="232.5" width="18" height="67.5"   fill="#4F9BE7"/>
      <rect x="40" y="131.25" width="18" height="168.75" fill="#4EB88A"/>
      <rect x="60" y="266.25" width="18" height="33.75" fill="#8B5CC7"/>
      <rect x="80" y="266.25" width="18" height="33.75" fill="#E5A83E"/>
    </g>

    <g font-size="12" fill="#242424" text-anchor="middle">
      <text x="74"  y="326">Solo / 2–10</text>
      <text x="219" y="326">11–50</text>
      <text x="364" y="326">51–500</text>
      <text x="509" y="326">500+</text>
    </g>
    <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C" text-anchor="middle">
      <text x="74"  y="340">n=35</text>
      <text x="219" y="340">n=27</text>
      <text x="364" y="340">n=15</text>
      <text x="509" y="340">n=11</text>
    </g>
  </g>

  <g id="source" transform="translate(28,500)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q16: AI teams only. % of each size band. Multi-select.</tspan>
    </text>
  </g>
</svg>
