<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 360" width="654" height="360" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="360" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">What are teams running in production?</text>
  </g>

  <g id="chart" transform="translate(28,80)">
    <!-- columns:  label 210px | gap 12 | bar 340px | gap 10 | value 36px  -->

    <g id="row-1" transform="translate(0,0)">
      <text x="0" y="18" font-size="13" fill="#242424">Background jobs or scheduled tasks</text>
      <rect x="222" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="222" y="2" width="316.2" height="26" fill="#FF7300"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#FF7300" font-variant-numeric="tabular-nums">93%</text>
    </g>

    <g id="row-2" transform="translate(0,44)">
      <text x="0" y="18" font-size="13" fill="#242424">Event-driven / webhook processing</text>
      <rect x="222" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="222" y="2" width="295.8" height="26" fill="#2389F1"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2389F1" font-variant-numeric="tabular-nums">87%</text>
    </g>

    <g id="row-3" transform="translate(0,88)">
      <text x="0" y="18" font-size="13" fill="#242424">Long-running workflows (min→days)</text>
      <rect x="222" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="222" y="2" width="231.2" height="26" fill="#2C9B63"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2C9B63" font-variant-numeric="tabular-nums">68%</text>
    </g>

    <g id="row-4" transform="translate(0,132)">
      <text x="0" y="18" font-size="13" fill="#242424">AI / LLM workflows</text>
      <rect x="222" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="222" y="2" width="231.2" height="26" fill="#8F75B7"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#8F75B7" font-variant-numeric="tabular-nums">68%</text>
    </g>

    <g id="row-5" transform="translate(0,176)">
      <text x="0" y="18" font-size="13" fill="#242424">Data pipelines (ETL, embedding, enrichment)</text>
      <rect x="222" y="2" width="340" height="26" fill="#E2E2E2"/>
      <rect x="222" y="2" width="214.2" height="26" fill="#FCC43F"/>
      <text x="598" y="20" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#B58700" font-variant-numeric="tabular-nums">63%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,316)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q2: What types of workflows are you running in production? Q11: Are you currently running AI</tspan>
      <tspan x="0" dy="14">workflows in production? All respondents n=130. Multi-select — totals exceed 100%.</tspan>
    </text>
  </g>
</svg>
