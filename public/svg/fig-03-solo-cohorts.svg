<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 980" width="654" height="980" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="980" fill="#ffffff"/>

  <g id="title">
