  <g id="source" transform="translate(28,900)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q2 × Q3 × Q11. Solo users of each tool only. % running each workflow type. Sorted by average</tspan>
      <tspan x="0" dy="14">across all five use cases. Temporal solo (n=3) and Prefect/Airflow solo (n=2) excluded.</tspan>
      <tspan x="0" dy="14">AWS/Vercel/CF drops sharply on long-running (43%) and AI (29%); BullMQ on data pipelines (17%).</tspan>
    </text>
