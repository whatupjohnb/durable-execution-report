      <text x="598" y="16" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#242424" font-variant-numeric="tabular-nums">avg 57%</text>
      <text x="598" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#7C7C7C" font-variant-numeric="tabular-nums">n=6</text>
