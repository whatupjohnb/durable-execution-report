      <g transform="translate(0,26)"><text x="0" y="16" font-size="12" fill="#242424">Event-driven</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="348" height="18" fill="#2389F1"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2389F1" font-variant-numeric="tabular-nums">87%</text></g>
      <g transform="translate(0,52)"><text x="0" y="16" font-size="12" fill="#242424">Long-running</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="268" height="18" fill="#2C9B63"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2C9B63" font-variant-numeric="tabular-nums">67%</text></g>
      <g transform="translate(0,78)"><text x="0" y="16" font-size="12" fill="#242424">Data pipelines</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="268" height="18" fill="#FCC43F"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#B58700" font-variant-numeric="tabular-nums">67%</text></g>
      <g transform="translate(0,104)"><text x="0" y="16" font-size="12" fill="#242424">AI workflows</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="212" height="18" fill="#8F75B7"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#8F75B7" font-variant-numeric="tabular-nums">53%</text></g>
