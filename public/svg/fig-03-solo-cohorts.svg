      <text x="598" y="16" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#242424" font-variant-numeric="tabular-nums">avg 63%</text>
      <text x="598" y="32" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#7C7C7C" font-variant-numeric="tabular-nums">n=7</text>
      <line x1="0" y1="42" x2="598" y2="42" stroke="#2389F1" stroke-width="1"/>
    </g>
    <g transform="translate(0,52)">
      <g transform="translate(0,0)"><text x="0" y="16" font-size="12" fill="#242424">Background jobs</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="344" height="18" fill="#FF7300"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#FF7300" font-variant-numeric="tabular-nums">86%</text></g>
      <g transform="translate(0,26)"><text x="0" y="16" font-size="12" fill="#242424">Event-driven</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="344" height="18" fill="#2389F1"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2389F1" font-variant-numeric="tabular-nums">86%</text></g>
      <g transform="translate(0,52)"><text x="0" y="16" font-size="12" fill="#242424">Long-running</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="172" height="18" fill="#2C9B63"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#2C9B63" font-variant-numeric="tabular-nums">43%</text></g>
      <g transform="translate(0,78)"><text x="0" y="16" font-size="12" fill="#242424">Data pipelines</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="284" height="18" fill="#FCC43F"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#B58700" font-variant-numeric="tabular-nums">71%</text></g>
      <g transform="translate(0,104)"><text x="0" y="16" font-size="12" fill="#242424">AI workflows</text><rect x="160" y="4" width="400" height="18" fill="#F6F6F6"/><rect x="160" y="4" width="116" height="18" fill="#8F75B7"/><text x="598" y="18" font-size="12" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#8F75B7" font-variant-numeric="tabular-nums">29%</text></g>
