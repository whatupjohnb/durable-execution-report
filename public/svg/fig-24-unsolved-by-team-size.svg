<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1117 1010" width="1117" height="1010" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="1117" height="1010" fill="#212121"/>

  <!-- Title -->
  <text x="48" y="84" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="-0.8">What's unsolved — by team size</text>

  <!-- Subtitle -->
  <text x="48" y="120" font-size="14" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">
    Q18: Themes in open-text responses by team size band. Bubble area = respondents mentioning each theme.
  </text>

  <!-- Legend -->
  <g id="legend" transform="translate(48,160)">
    <g transform="translate(0,0)">
      <circle cx="10" cy="10" r="10" fill="#FC9680"/>
      <text x="30" y="10" font-size="14" fill="#FFFFFF">Solo / 2–10</text>
      <text x="30" y="26" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=47</text>
    </g>
    <g transform="translate(178,0)">
      <circle cx="10" cy="10" r="10" fill="#FB5536"/>
      <text x="30" y="10" font-size="14" fill="#FFFFFF">11–50</text>
      <text x="30" y="26" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=40</text>
    </g>
    <g transform="translate(316,0)">
      <circle cx="10" cy="10" r="10" fill="#C2401F"/>
      <text x="30" y="10" font-size="14" fill="#FFFFFF">51–500</text>
      <text x="30" y="26" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=27</text>
    </g>
    <g transform="translate(454,0)">
      <circle cx="10" cy="10" r="10" fill="#7A2818"/>
      <text x="30" y="10" font-size="14" fill="#FFFFFF">500+</text>
      <text x="30" y="26" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=16</text>
    </g>
  </g>

  <!--
    Layout:
    - Cohort label col: x=48..173 (125 wide, incl. padding)
    - 7 theme columns × 128 = 896, starts at x=173, ends at x=1069
    - Theme col centers: 237, 365, 493, 621, 749, 877, 1005
    - Row centers (cohort): 370, 510, 650, 790
    - Bubble radius = sqrt(value) × 14
  -->

  <!-- Theme column headers (2-line wrap) -->
  <g id="theme-headers" transform="translate(0,232)">
    <g font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">
      <g transform="translate(237,0)">
        <text y="18">Observability</text>
        <text y="40">&amp; debugging</text>
      </g>
      <g transform="translate(365,0)">
        <text y="18">Scalability</text>
        <text y="40">&amp; cost</text>
      </g>
      <g transform="translate(493,0)">
        <text y="18">Non-</text>
        <text y="40">determinism</text>
      </g>
      <g transform="translate(621,0)">
        <text y="18">State &amp;</text>
        <text y="40">durability</text>
      </g>
      <g transform="translate(749,0)">
        <text y="18">Evals</text>
        <text y="40">at scale</text>
      </g>
      <g transform="translate(877,0)">
        <text y="18">Tooling</text>
        <text y="40">frag.</text>
      </g>
      <g transform="translate(1005,0)">
        <text y="18">Context /</text>
        <text y="40">memory</text>
      </g>
    </g>
  </g>

  <!-- Divider under headers -->
  <line x1="48" y1="298" x2="1069" y2="298" stroke="#3A3A3A" stroke-width="1"/>

  <!-- Grid column dividers (subtle) -->
  <g stroke="#2A2A2A" stroke-width="1">
    <line x1="173" y1="310" x2="173" y2="860"/>
    <line x1="301" y1="310" x2="301" y2="860"/>
    <line x1="429" y1="310" x2="429" y2="860"/>
    <line x1="557" y1="310" x2="557" y2="860"/>
    <line x1="685" y1="310" x2="685" y2="860"/>
    <line x1="813" y1="310" x2="813" y2="860"/>
    <line x1="941" y1="310" x2="941" y2="860"/>
    <line x1="1069" y1="310" x2="1069" y2="860"/>
  </g>

  <!-- Subtle horizontal row dividers -->
  <g stroke="#2A2A2A" stroke-width="1">
    <line x1="48" y1="440" x2="1069" y2="440"/>
    <line x1="48" y1="580" x2="1069" y2="580"/>
    <line x1="48" y1="720" x2="1069" y2="720"/>
  </g>

  <!-- ROW 1: Solo / 2–10   values [8, 13, 3, 5, 6, 1, 3] -->
  <g id="row-solo" transform="translate(0,370)">
    <text x="48" y="0" font-size="22" font-weight="600" fill="#FFFFFF">Solo / 2–10</text>
    <text x="48" y="26" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=47</text>
    <g fill="#FC9680">
      <circle cx="237"  cy="0" r="39.60"/>
      <circle cx="365"  cy="0" r="50.48"/>
      <circle cx="493"  cy="0" r="24.25"/>
      <circle cx="621"  cy="0" r="31.30"/>
      <circle cx="749"  cy="0" r="34.29"/>
      <circle cx="877"  cy="0" r="14.00"/>
      <circle cx="1005" cy="0" r="24.25"/>
    </g>
    <g font-size="18" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#212121" font-weight="700">
      <text x="237"  y="6">8</text>
      <text x="365"  y="6">13</text>
      <text x="493"  y="6">3</text>
      <text x="621"  y="6">5</text>
      <text x="749"  y="6">6</text>
      <text x="877"  y="6">1</text>
      <text x="1005" y="6">3</text>
    </g>
  </g>

  <!-- ROW 2: 11–50   values [8, 4, 2, 3, 3, 5, 4] -->
  <g id="row-11-50" transform="translate(0,510)">
    <text x="48" y="0" font-size="22" font-weight="600" fill="#FFFFFF">11–50</text>
    <text x="48" y="26" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=40</text>
    <g fill="#FB5536">
      <circle cx="237"  cy="0" r="39.60"/>
      <circle cx="365"  cy="0" r="28.00"/>
      <circle cx="493"  cy="0" r="19.80"/>
      <circle cx="621"  cy="0" r="24.25"/>
      <circle cx="749"  cy="0" r="24.25"/>
      <circle cx="877"  cy="0" r="31.30"/>
      <circle cx="1005" cy="0" r="28.00"/>
    </g>
    <g font-size="18" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#FFFFFF" font-weight="700">
      <text x="237"  y="6">8</text>
      <text x="365"  y="6">4</text>
      <text x="493"  y="6">2</text>
      <text x="621"  y="6">3</text>
      <text x="749"  y="6">3</text>
      <text x="877"  y="6">5</text>
      <text x="1005" y="6">4</text>
    </g>
  </g>

  <!-- ROW 3: 51–500   values [7, 3, 3, 4, 1, 2, 0] -->
  <g id="row-51-500" transform="translate(0,650)">
    <text x="48" y="0" font-size="22" font-weight="600" fill="#FFFFFF">51–500</text>
    <text x="48" y="26" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=27</text>
    <g fill="#C2401F">
      <circle cx="237"  cy="0" r="37.04"/>
      <circle cx="365"  cy="0" r="24.25"/>
      <circle cx="493"  cy="0" r="24.25"/>
      <circle cx="621"  cy="0" r="28.00"/>
      <circle cx="749"  cy="0" r="14.00"/>
      <circle cx="877"  cy="0" r="19.80"/>
    </g>
    <g font-size="18" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#FFFFFF" font-weight="700">
      <text x="237"  y="6">7</text>
      <text x="365"  y="6">3</text>
      <text x="493"  y="6">3</text>
      <text x="621"  y="6">4</text>
      <text x="749"  y="6">1</text>
      <text x="877"  y="6">2</text>
    </g>
    <text x="1005" y="6" font-size="16" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#4A4A4A">—</text>
  </g>

  <!-- ROW 4: 500+   values [2, 4, 6, 0, 2, 0, 0] -->
  <g id="row-500plus" transform="translate(0,790)">
    <text x="48" y="0" font-size="22" font-weight="600" fill="#FFFFFF">500+</text>
    <text x="48" y="26" font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#9B9B9B">n=16</text>
    <g fill="#7A2818">
      <circle cx="237"  cy="0" r="19.80"/>
      <circle cx="365"  cy="0" r="28.00"/>
      <circle cx="493"  cy="0" r="34.29"/>
      <circle cx="749"  cy="0" r="19.80"/>
    </g>
    <g font-size="18" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" text-anchor="middle" fill="#FFFFFF" font-weight="700">
      <text x="237"  y="6">2</text>
      <text x="365"  y="6">4</text>
      <text x="493"  y="6">6</text>
      <text x="749"  y="6">2</text>
    </g>
    <g font-size="16" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#4A4A4A">
      <text x="621"  y="6">—</text>
      <text x="877"  y="6">—</text>
      <text x="1005" y="6">—</text>
    </g>
  </g>

  <!-- Source -->
  <g id="source" transform="translate(48,952)">
    <text font-size="13" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#808080">
      <tspan x="0" dy="0">19% of responses name observability as the core unsolved problem — the highest of</tspan>
      <tspan x="0" dy="20">any theme, and equal across AI (18%) and non-AI (21%) teams.</tspan>
    </text>
  </g>
</svg>
