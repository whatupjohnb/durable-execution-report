<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 500" width="654" height="500" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="500" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">What's unsolved — by team size</text>
  </g>

  <g id="legend" transform="translate(28,78)">
    <g transform="translate(0,0)"><circle r="5" cx="5" cy="5" fill="#F54A3F"/><text x="14" y="9" font-size="11" fill="#242424">Solo / 2–10 (n=47)</text></g>
    <g transform="translate(148,0)"><circle r="5" cx="5" cy="5" fill="#2389F1"/><text x="14" y="9" font-size="11" fill="#242424">11–50 (n=40)</text></g>
    <g transform="translate(276,0)"><circle r="5" cx="5" cy="5" fill="#2C9B63"/><text x="14" y="9" font-size="11" fill="#242424">51–500 (n=27)</text></g>
    <g transform="translate(404,0)"><circle r="5" cx="5" cy="5" fill="#8F75B7"/><text x="14" y="9" font-size="11" fill="#242424">500+ (n=16)</text></g>
  </g>

  <!--
    Bubble matrix. 7 themes × 4 cohort columns.
    Column x positions: 212, 296, 380, 464  (step 84)
    Row y positions: 12 themes rows, step 44.
    Bubble radius: sqrt(value) * 3
  -->
  <g id="headers" transform="translate(0,118)">
    <g font-size="11" fill="#242424" text-anchor="middle">
      <text x="212" y="18">Solo / 2–10</text>
      <text x="296" y="18">11–50</text>
      <text x="380" y="18">51–500</text>
      <text x="464" y="18">500+</text>
    </g>
  </g>

  <g id="rows" transform="translate(28,148)">

    <!-- Observability & debugging: 8, 8, 7, 2 -->
    <g transform="translate(0,0)">
      <text x="0" y="22" font-size="12" fill="#242424">Observability &amp; debugging</text>
      <circle cx="184" cy="22" r="8.49" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="8.49" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="7.94" fill="#2C9B63" opacity="0.9"/>
      <circle cx="436" cy="22" r="4.24" fill="#8F75B7" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">8</text>
        <text x="268" y="25">8</text>
        <text x="352" y="25">7</text>
        <text x="436" y="25" fill="#8F75B7">2</text>
      </g>
    </g>

    <!-- Scalability & cost: 13, 4, 3, 4 -->
    <g transform="translate(0,44)">
      <text x="0" y="22" font-size="12" fill="#242424">Scalability &amp; cost</text>
      <circle cx="184" cy="22" r="10.82" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="6" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="5.2" fill="#2C9B63" opacity="0.9"/>
      <circle cx="436" cy="22" r="6" fill="#8F75B7" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">13</text>
        <text x="268" y="25">4</text>
        <text x="352" y="25">3</text>
        <text x="436" y="25">4</text>
      </g>
    </g>

    <!-- Non-determinism: 3, 2, 3, 6 -->
    <g transform="translate(0,88)">
      <text x="0" y="22" font-size="12" fill="#242424">Non-determinism</text>
      <circle cx="184" cy="22" r="5.2" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="4.24" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="5.2" fill="#2C9B63" opacity="0.9"/>
      <circle cx="436" cy="22" r="7.35" fill="#8F75B7" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">3</text>
        <text x="268" y="25">2</text>
        <text x="352" y="25">3</text>
        <text x="436" y="25">6</text>
      </g>
    </g>

    <!-- State & durability: 5, 3, 4, 0 -->
    <g transform="translate(0,132)">
      <text x="0" y="22" font-size="12" fill="#242424">State &amp; durability</text>
      <circle cx="184" cy="22" r="6.71" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="5.2" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="6" fill="#2C9B63" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">5</text>
        <text x="268" y="25">3</text>
        <text x="352" y="25">4</text>
      </g>
    </g>

    <!-- Evals at scale: 6, 3, 1, 2 -->
    <g transform="translate(0,176)">
      <text x="0" y="22" font-size="12" fill="#242424">Evals at scale</text>
      <circle cx="184" cy="22" r="7.35" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="5.2" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="3" fill="#2C9B63" opacity="0.9"/>
      <circle cx="436" cy="22" r="4.24" fill="#8F75B7" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">6</text>
        <text x="268" y="25">3</text>
        <text x="352" y="25" fill="#2C9B63">1</text>
        <text x="436" y="25">2</text>
      </g>
    </g>

    <!-- Tooling frag.: 1, 5, 2, 0 -->
    <g transform="translate(0,220)">
      <text x="0" y="22" font-size="12" fill="#242424">Tooling frag.</text>
      <circle cx="184" cy="22" r="3" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="6.71" fill="#2389F1" opacity="0.9"/>
      <circle cx="352" cy="22" r="4.24" fill="#2C9B63" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25" fill="#F54A3F">1</text>
        <text x="268" y="25">5</text>
        <text x="352" y="25">2</text>
      </g>
    </g>

    <!-- Context / memory: 3, 4, 0, 0 -->
    <g transform="translate(0,264)">
      <text x="0" y="22" font-size="12" fill="#242424">Context / memory</text>
      <circle cx="184" cy="22" r="5.2" fill="#F54A3F" opacity="0.9"/>
      <circle cx="268" cy="22" r="6" fill="#2389F1" opacity="0.9"/>
      <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" font-variant-numeric="tabular-nums" fill="#ffffff" text-anchor="middle">
        <text x="184" y="25">3</text>
        <text x="268" y="25">4</text>
