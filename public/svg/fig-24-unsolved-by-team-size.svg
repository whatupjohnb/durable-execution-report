  <g id="source" transform="translate(28,460)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q18: Themes in open-text responses by team size band. Bubble area = number of</tspan>
      <tspan x="0" dy="14">respondents mentioning each theme.</tspan>
    </text>
