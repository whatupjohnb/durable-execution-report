<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 420" width="654" height="420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="420" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Confidence in scaling AI workloads — by team size</text>
  </g>

  <g id="legend" transform="translate(28,78)">
    <g transform="translate(0,0)"><rect width="10" height="10" fill="#2C9B63"/><text x="16" y="9" font-size="11" fill="#242424">Very confident</text></g>
    <g transform="translate(128,0)"><rect width="10" height="10" fill="#9ADAB3"/><text x="16" y="9" font-size="11" fill="#242424">Somewhat confident</text></g>
    <g transform="translate(270,0)"><rect width="10" height="10" fill="#FA8D86"/><text x="16" y="9" font-size="11" fill="#242424">Not very confident</text></g>
    <g transform="translate(412,0)"><rect width="10" height="10" fill="#A52015"/><text x="16" y="9" font-size="11" fill="#242424">Not at all confident</text></g>
  </g>

  <!-- label 100 | bar 440 | right 60. -->
  <g id="rows" transform="translate(28,118)">

    <!-- Solo/2–10 n=35 26/57/14/3 -->
    <g id="row-1" transform="translate(0,0)">
      <text x="0" y="18" font-size="13" fill="#242424">Solo / 2–10</text>
      <text x="0" y="34" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=35</text>
      <g transform="translate(96,0)">
        <rect x="0"   y="4" width="114.4" height="30" fill="#2C9B63"/>
        <rect x="114.4" y="4" width="250.8" height="30" fill="#9ADAB3"/>
        <rect x="365.2" y="4" width="61.6" height="30" fill="#FA8D86"/>
        <rect x="426.8" y="4" width="13.2" height="30" fill="#A52015"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="57" y="24">26%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="240" y="24">57%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="396" y="24">14%</text></g>
      </g>
      <text x="598" y="24" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">26% / 17%</text>
    </g>

    <!-- 11–50 n=27 22/59/15/4 -->
    <g id="row-2" transform="translate(0,60)">
      <text x="0" y="18" font-size="13" fill="#242424">11–50</text>
      <text x="0" y="34" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=27</text>
      <g transform="translate(96,0)">
        <rect x="0"   y="4" width="96.8" height="30" fill="#2C9B63"/>
        <rect x="96.8" y="4" width="259.6" height="30" fill="#9ADAB3"/>
        <rect x="356.4" y="4" width="66" height="30" fill="#FA8D86"/>
        <rect x="422.4" y="4" width="17.6" height="30" fill="#A52015"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="48" y="24">22%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="227" y="24">59%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="389" y="24">15%</text></g>
      </g>
      <text x="598" y="24" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">22% / 19%</text>
    </g>

    <!-- 51–500 n=15 13/80/7/0 -->
    <g id="row-3" transform="translate(0,120)">
      <text x="0" y="18" font-size="13" fill="#242424">51–500</text>
      <text x="0" y="34" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=15</text>
      <g transform="translate(96,0)">
        <rect x="0"   y="4" width="57.2"  height="30" fill="#2C9B63"/>
        <rect x="57.2" y="4" width="352"   height="30" fill="#9ADAB3"/>
        <rect x="409.2" y="4" width="30.8" height="30" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="29" y="24">13%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="233" y="24">80%</text></g>
      </g>
      <text x="598" y="24" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">13% / 7%</text>
    </g>

    <!-- 500+ n=11 0/73/27/0 -->
    <g id="row-4" transform="translate(0,180)">
      <text x="0" y="18" font-size="13" fill="#242424">500+</text>
      <text x="0" y="34" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=11</text>
      <g transform="translate(96,0)">
        <rect x="0"   y="4" width="321.2" height="30" fill="#9ADAB3"/>
        <rect x="321.2" y="4" width="118.8" height="30" fill="#FA8D86"/>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#020202" text-anchor="middle"><text x="161" y="24">73%</text></g>
        <g font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="middle"><text x="381" y="24">27%</text></g>
      </g>
      <text x="598" y="24" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="end" fill="#636363" font-variant-numeric="tabular-nums">0% / 27%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,380)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q13: How confident are you in your setup's ability to handle AI workloads reliably at 2–3×</tspan>
      <tspan x="0" dy="14">current scale? AI teams only.</tspan>
    </text>
  </g>
</svg>
