<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 440" width="654" height="440" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="440" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">What's broken about agent frameworks</text>
  </g>

  <g id="chart" transform="translate(28,86)">
    <!-- bar scale 0..100 = 598px track -->

    <g id="row-1" transform="translate(0,0)">
      <text x="0" y="14" font-size="12" fill="#242424">Abstractions make failures harder to trace</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=37</text>
      <rect x="0" y="38" width="598" height="22" fill="#E2E2E2"/>
      <rect x="0" y="38" width="155.48" height="22" fill="#FF7300"/>
      <text x="147" y="54" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">26%</text>
    </g>

    <g id="row-2" transform="translate(0,74)">
      <text x="0" y="14" font-size="12" fill="#242424">Poor support for long-running or stateful workflows</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=27</text>
      <rect x="0" y="38" width="598" height="22" fill="#E2E2E2"/>
      <rect x="0" y="38" width="113.62" height="22" fill="#2389F1"/>
      <text x="106" y="54" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">19%</text>
    </g>

    <g id="row-3" transform="translate(0,148)">
      <text x="0" y="14" font-size="12" fill="#242424">Only handles orchestration at the application layer (not infra)</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=22</text>
      <rect x="0" y="38" width="598" height="22" fill="#E2E2E2"/>
      <rect x="0" y="38" width="89.7" height="22" fill="#8F75B7"/>
      <text x="82" y="54" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">15%</text>
    </g>

    <g id="row-4" transform="translate(0,222)">
      <text x="0" y="14" font-size="12" fill="#242424" opacity="0.7">We're not using frameworks / don't know enough to comment</text>
      <text x="0" y="30" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">n=22</text>
      <rect x="0" y="38" width="598" height="22" fill="#E2E2E2"/>
      <rect x="0" y="38" width="89.7" height="22" fill="#9B9B9B"/>
      <text x="82" y="54" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">15%</text>
    </g>

    <g id="row-5" transform="translate(0,296)">
      <text x="0" y="10" font-size="11" fill="#242424">Abstractions are too rigid <tspan fill="#7C7C7C" font-family="'JetBrains Mono', ui-monospace, monospace"> n=22</tspan></text>
      <rect x="0" y="16" width="598" height="18" fill="#E2E2E2"/>
      <rect x="0" y="16" width="89.7" height="18" fill="#2C9B63"/>
      <text x="82" y="29" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">15%</text>
    </g>

    <g id="row-6" transform="translate(0,330)">
      <text x="0" y="10" font-size="11" fill="#242424">Lock-in makes it hard to switch models or providers <tspan fill="#7C7C7C" font-family="'JetBrains Mono', ui-monospace, monospace"> n=18</tspan></text>
      <rect x="0" y="16" width="598" height="18" fill="#E2E2E2"/>
      <rect x="0" y="16" width="77.74" height="18" fill="#FCC43F"/>
      <text x="70" y="29" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#ffffff" text-anchor="end" font-variant-numeric="tabular-nums">13%</text>
    </g>
  </g>

  <g id="source" transform="translate(28,410)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">Q17: What do you believe are the biggest limitations of modern agent frameworks?</tspan>
      <tspan x="0" dy="14">% of all respondents citing each limitation (n=143).</tspan>
    </text>
  </g>
</svg>
