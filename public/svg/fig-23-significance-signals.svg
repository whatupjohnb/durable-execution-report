<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 654 900" width="654" height="900" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" text-rendering="optimizeLegibility">
  <rect width="654" height="900" fill="#ffffff"/>

  <g id="title">
    <text x="28" y="48" font-size="22" font-weight="600" fill="#020202" letter-spacing="-0.3">Most statistically significant signals for confidence in scaling AI</text>
  </g>

  <g id="subtitle">
    <text x="28" y="78" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="28" dy="0">Net = % confident (n=73) minus % unconfident (n=15). *** p&lt;0.01, ** p&lt;0.05, * p&lt;0.10,</tspan>
      <tspan x="28" dy="14">ns not significant. Greyed rows shown for context only.</tspan>
    </text>
  </g>

  <!--
    Divergent bar chart. Zero line in middle. Domain −40..+40.
    Plot left x=260, width=320. Zero at x=260+160=420.
    Scale: 4 px/pp.
    Row height: 36. Each group has name header 28px tall.
  -->

  <g id="axis" transform="translate(260,120)">
    <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C" text-anchor="middle">
      <text x="0" y="0">-40</text>
      <text x="80" y="0">-20</text>
      <text x="160" y="0">0</text>
      <text x="240" y="0">+20</text>
      <text x="320" y="0">+40pp</text>
    </g>
    <line x1="160" y1="4" x2="160" y2="750" stroke="#B0B0B0" stroke-dasharray="2 3"/>
  </g>

  <g id="headers-col" transform="translate(540,120)">
    <g font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#7C7C7C">
      <text x="0" y="0" text-anchor="middle">conf</text>
      <text x="40" y="0" text-anchor="middle">unconf</text>
      <text x="80" y="0" text-anchor="middle">sig</text>
    </g>
  </g>

  <!-- GROUP 1: Strongest positive combinations -->
  <g id="group-1" transform="translate(28,140)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#020202">Strongest positive combinations</text>

    <!-- row: Durable execution + evals + low burden (+36, 49, 13, **) -->
    <g transform="translate(0,28)">
      <text x="0" y="18" font-size="11" fill="#242424">Durable execution + evals + low burden</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="144" height="18" fill="#2C9B63"/>
        <text x="308" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" font-variant-numeric="tabular-nums">+36</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">49%</text>
        <text x="40" y="20">13%</text>
        <text x="80" y="20" fill="#2C9B63">**</text>
      </g>
    </g>

    <!-- Durable execution + evals (+33, 60, 27, **) -->
    <g transform="translate(0,64)">
      <text x="0" y="18" font-size="11" fill="#242424">Durable execution + evals</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="132" height="18" fill="#2C9B63"/>
        <text x="296" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" font-variant-numeric="tabular-nums">+33</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">60%</text>
        <text x="40" y="20">27%</text>
        <text x="80" y="20" fill="#2C9B63">**</text>
      </g>
    </g>

    <!-- Evals + fast debug (+32, 32, 0, ***) -->
    <g transform="translate(0,100)">
      <text x="0" y="18" font-size="11" fill="#242424">Evals + fast debug</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="128" height="18" fill="#2C9B63"/>
        <text x="292" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" font-variant-numeric="tabular-nums">+32</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">32%</text>
        <text x="40" y="20">0%</text>
        <text x="80" y="20" fill="#2C9B63">***</text>
      </g>
    </g>

    <!-- Durable execution + orch-native insights + low burden (+34, 47, 13, ns)  grey -->
    <g transform="translate(0,136)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Durable execution + orch-native insights + low burden</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="136" height="18" fill="#9ADAB3"/>
        <text x="300" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+34</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">47%</text>
        <text x="40" y="20">13%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- Durable execution + fast debug (+30, 37, 7, ns) grey -->
    <g transform="translate(0,172)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Durable execution + fast debug</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="120" height="18" fill="#9ADAB3"/>
        <text x="284" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+30</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">37%</text>
        <text x="40" y="20">7%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- Orch-native insights + fast debug (+27, 27, 0, ns) grey -->
    <g transform="translate(0,208)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Orch-native insights + fast debug</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="108" height="18" fill="#9ADAB3"/>
        <text x="272" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+27</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">27%</text>
        <text x="40" y="20">0%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>
  </g>

  <!-- GROUP 2: Single factors -->
  <g id="group-2" transform="translate(28,400)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#020202">Single factors</text>

    <!-- Has production evals (+30, 70, 40, **) -->
    <g transform="translate(0,28)">
      <text x="0" y="18" font-size="11" fill="#242424">Has production evals</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="120" height="18" fill="#2C9B63"/>
        <text x="284" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" font-variant-numeric="tabular-nums">+30</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
