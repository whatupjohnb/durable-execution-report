  <g id="source" transform="translate(28,860)">
    <text font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#636363">
      <tspan x="0" dy="0">AI teams only. Opacity indicates statistical significance (Fisher's exact test).</tspan>
    </text>
  </g>
</svg>
