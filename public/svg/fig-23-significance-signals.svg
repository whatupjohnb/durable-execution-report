      <g transform="translate(232,0)">
        <rect x="160" y="6" width="116" height="18" fill="#2C9B63"/>
        <text x="280" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#2C9B63" font-variant-numeric="tabular-nums">+29</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">42%</text>
        <text x="40" y="20">13%</text>
        <text x="80" y="20" fill="#2C9B63">**</text>
      </g>
    </g>

    <!-- Orchestration-native insights (+22, 62, 40, ns) grey -->
    <g transform="translate(0,100)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Orchestration-native insights</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="88" height="18" fill="#9ADAB3"/>
        <text x="252" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+22</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">62%</text>
        <text x="40" y="20">40%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- Any structured orchestration (+15, 88, 73, ns) grey -->
    <g transform="translate(0,136)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Any structured orchestration</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="60" height="18" fill="#9ADAB3"/>
        <text x="224" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+15</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">88%</text>
        <text x="40" y="20">73%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- Low reliability burden (+15, 82, 67, ns) grey -->
    <g transform="translate(0,172)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Low reliability burden</text>
      <g transform="translate(232,0)">
        <rect x="160" y="6" width="60" height="18" fill="#9ADAB3"/>
        <text x="224" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" font-variant-numeric="tabular-nums">+15</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">82%</text>
        <text x="40" y="20">67%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>
  </g>

  <!-- GROUP 3: Anti-patterns -->
  <g id="group-3" transform="translate(28,628)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#020202">Anti-patterns</text>

    <!-- No evals + no orch-native insights (-33, 14, 47, ***) -->
    <g transform="translate(0,28)">
      <text x="0" y="18" font-size="11" fill="#242424">No evals + no orch-native insights</text>
      <g transform="translate(232,0)">
        <rect x="28" y="6" width="132" height="18" fill="#F54A3F"/>
        <text x="20" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#F54A3F" text-anchor="end" font-variant-numeric="tabular-nums">-33</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">14%</text>
        <text x="40" y="20">47%</text>
        <text x="80" y="20" fill="#F54A3F">***</text>
      </g>
    </g>

    <!-- No production evals (-30, 30, 60, **) -->
    <g transform="translate(0,64)">
      <text x="0" y="18" font-size="11" fill="#242424">No production evals</text>
      <g transform="translate(232,0)">
        <rect x="40" y="6" width="120" height="18" fill="#F54A3F"/>
        <text x="32" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#F54A3F" text-anchor="end" font-variant-numeric="tabular-nums">-30</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">30%</text>
        <text x="40" y="20">60%</text>
        <text x="80" y="20" fill="#F54A3F">**</text>
      </g>
    </g>

    <!-- Logs only (-10, 3, 13, ns) grey -->
    <g transform="translate(0,100)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Logs only</text>
      <g transform="translate(232,0)">
        <rect x="120" y="6" width="40" height="18" fill="#FA8D86"/>
        <text x="112" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" text-anchor="end" font-variant-numeric="tabular-nums">-10</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">3%</text>
        <text x="40" y="20">13%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- Ad-hoc or no orchestration (-25, 15, 40, ns) grey -->
    <g transform="translate(0,136)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">Ad-hoc or no orchestration</text>
      <g transform="translate(232,0)">
        <rect x="60" y="6" width="100" height="18" fill="#FA8D86"/>
        <text x="52" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" text-anchor="end" font-variant-numeric="tabular-nums">-25</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">15%</text>
        <text x="40" y="20">40%</text>
        <text x="80" y="20">ns</text>
      </g>
    </g>

    <!-- No structured orchestration (-15, 12, 27, ns) grey -->
    <g transform="translate(0,172)" opacity="0.55">
      <text x="0" y="18" font-size="11" fill="#242424">No structured orchestration</text>
      <g transform="translate(232,0)">
        <rect x="100" y="6" width="60" height="18" fill="#FA8D86"/>
        <text x="92" y="20" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#242424" text-anchor="end" font-variant-numeric="tabular-nums">-15</text>
      </g>
      <g transform="translate(512,0)" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle" fill="#242424" font-variant-numeric="tabular-nums">
        <text x="0" y="20">12%</text>
        <text x="40" y="20">27%</text>
